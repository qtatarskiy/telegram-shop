<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERAZOR SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@3.4.15"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex flex-col select-none">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50 px-4 py-3 flex items-center justify-between shadow-xs">
        <h1 class="text-lg font-black tracking-wider text-gray-900">TERAZOR SHOP</h1>
        <button id="toggle-mode" class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-[11px] px-3 py-1.5 rounded-full font-bold uppercase transition-colors cursor-pointer">
            Управление (Админка)
        </button>
    </header>

    <main id="buyer-view" class="p-4 pb-24 flex-1">
        <p class="text-xs text-gray-500 mb-4">Выберите товар и нажмите кнопку для заказа в чате</p>
        <div id="catalog" class="grid grid-cols-2 gap-3"></div>
    </main>

    <main id="admin-view" class="hidden p-4 pb-24 flex-1 max-w-xl mx-auto w-full">
        <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-xs mb-6">
            <h2 class="text-base font-bold mb-4 text-blue-600">＋ Добавить новый товар</h2>
            <form id="add-form" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-semibold text-gray-500 uppercase mb-1">Название *</label>
                    <input type="text" id="prod-title" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-hidden focus:border-blue-500" placeholder="Худи Зипка">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-gray-500 uppercase mb-1">Цена (руб) *</label>
                    <input type="number" id="prod-price" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-hidden focus:border-blue-500" placeholder="3990">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-gray-500 uppercase mb-1">Ссылка на фото</label>
                    <input type="url" id="prod-image" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-hidden focus:border-blue-500" placeholder="https://...">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-gray-500 uppercase mb-1">Описание</label>
                    <textarea id="prod-desc" rows="2" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-hidden focus:border-blue-500 resize-none" placeholder="Плотный хлопок..."></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl text-sm transition-colors cursor-pointer">
                    Выставить на витрину
                </button>
            </form>
        </div>

        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Текущие товары (Кликни для удаления):</h2>
        <div id="admin-list" class="space-y-2"></div>
    </main>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();

        let currentProduct = null;
        let isAdmin = false;

        // Начальные товары по умолчанию
        const defaultProducts = [
            { id: 1, title: "Оверсайз худи Black", price: 3990, image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=400", desc: "Плотный футер 3-нитка с начесом. Унисекс." },
            { id: 2, title: "Базовая футболка White", price: 1990, image: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=400", desc: "Хлопок 100%, премиум качество, свободный крой." }
        ];

        // Загрузка базы из памяти браузера (localStorage)
        let products = JSON.parse(localStorage.getItem('shop_products')) || defaultProducts;

        const catalogContainer = document.getElementById('catalog');
        const adminListContainer = document.getElementById('admin-list');

        function render() {
            catalogContainer.innerHTML = "";
            adminListContainer.innerHTML = "";
            localStorage.setItem('shop_products', JSON.stringify(products));

            products.forEach(product => {
                // Рендер для витрины покупателя
                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-xl border border-gray-100 flex flex-col justify-between active:scale-95 transition-transform cursor-pointer shadow-xs";
                card.onclick = () => selectProduct(product);
                card.innerHTML = `
                    <div>
                        <div class="w-full aspect-square bg-gray-100 rounded-lg overflow-hidden">
                            <img src="${product.image}" class="w-full h-full object-cover">
                        </div>
                        <h3 class="text-xs font-semibold text-gray-800 mt-2 h-8 line-clamp-2">${product.title}</h3>
                        <p class="text-[10px] text-gray-400 mt-0.5 line-clamp-1">${product.desc}</p>
                    </div>
                    <div class="mt-2 flex items-center justify-between">
                        <span class="text-xs font-bold text-gray-950">${product.price} ₽</span>
                        <span class="text-[10px] bg-gray-100 text-gray-700 px-2 py-1 rounded-md font-medium">Заказать</span>
                    </div>
                `;
                catalogContainer.appendChild(card);

                // Рендер элементов списка удаления для Админа
                const adminItem = document.createElement('div');
                adminItem.className = "bg-white p-3 rounded-xl border border-gray-200 flex items-center justify-between active:bg-red-50 cursor-pointer transition-colors";
                adminItem.onclick = () => deleteProduct(product.id);
                adminItem.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${product.image}" class="w-10 h-10 object-cover rounded-lg bg-gray-100">
                        <div>
                            <h4 class="text-xs font-bold text-gray-900">${product.title}</h4>
                            <p class="text-[11px] text-blue-600 font-semibold">${product.price} ₽</p>
                        </div>
                    </div>
                    <span class="text-xs text-red-500 font-medium">Удалить</span>
                `;
                adminListContainer.appendChild(adminItem);
            });
        }

        // Выбор товара покупателем
        function selectProduct(product) {
            if (!tg) return;
            currentProduct = product;
            tg.MainButton.text = `Купить ${product.title} за ${product.price} ₽`;
            tg.MainButton.textColor = "#FFFFFF";
            tg.MainButton.color = "#000000";
            tg.MainButton.show();
        }

        // Отправка заказа боту
        if (tg) {
            tg.MainButton.onClick(() => {
                if (currentProduct) {
                    const messageData = { action: "order", product_title: currentProduct.title, price: currentProduct.price };
                    tg.sendData(JSON.stringify(messageData));
                    tg.close();
                }
            });
        }

        // Переключение режимов (Админ / Покупатель)
        document.getElementById('toggle-mode').onclick = () => {
            isAdmin = !isAdmin;
            document.getElementById('buyer-view').classList.toggle('hidden', isAdmin);
            document.getElementById('admin-view').classList.toggle('hidden', !isAdmin);
            document.getElementById('toggle-mode').textContent = isAdmin ? "В каталог" : "Управление (Админка)";
            if (tg) tg.MainButton.hide();
        };

        // Добавление нового товара из админки
        document.getElementById('add-form').onsubmit = (e) => {
            e.preventDefault();
            const newProduct = {
                id: Date.now(),
                title: document.getElementById('prod-title').value.trim(),
                price: parseInt(document.getElementById('prod-price').value),
                image: document.getElementById('prod-image').value.trim() || "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=400",
                desc: document.getElementById('prod-desc').value.trim() || "Описание товара."
            };
            products.push(newProduct);
            document.getElementById('add-form').reset();
            render();
        };

        // Удаление товара
        function deleteProduct(id) {
            if (confirm("Удалить этот товар с витрины?")) {
                products = products.filter(p => p.id !== id);
                render();
            }
        }

        // Первичный запуск отрисовки
        render();
    </script>
</body>
</html>
